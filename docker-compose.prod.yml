# KBOS — production compose using pre-built image from ghcr.io
# See README.md for full setup instructions.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml pull   # upgrade to latest

services:
  init:
    image: ghcr.io/nixbin-engineering/kbos:latest
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    volumes:
      - ${VAULT_PATH:-./vault}:/vault
      - ${VAULTS_BASE:-./vaults}:/vaults
    entrypoint: ["/bin/sh", "/scripts/init-vault.sh"]
    restart: "no"

  web:
    image: ghcr.io/nixbin-engineering/kbos:latest
    container_name: kbos
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    ports:
      - "${KBOS_PORT:-3000}:3000"
    networks:
      - proxy
    environment:
      VAULT_PATH: /vault
      VAULTS_BASE: /vaults
      NODE_ENV: production
    volumes:
      - ${VAULT_PATH:-./vault}:/vault
      - ${VAULTS_BASE:-./vaults}:/vaults
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  proxy:
    name: proxy
    external: true
